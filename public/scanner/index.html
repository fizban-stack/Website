<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NVD Lookup · James Wells</title>
  <meta name="description" content="Search the NVD database for CVE vulnerabilities by keyword." />
  <link rel="icon" type="image/webp" href="/favicon.webp" />
  <link rel="stylesheet" href="/scanner/styles.css" />
</head>
<body>
  <p id="back-link"><a href="/stories/cyber/projects/nvd-scanner/">← Back to the write-up</a></p>

  <div id="search-area">
    <h1>NVD Lookup</h1>

    <div id="controls">
      <input
        type="text"
        id="cve-search"
        placeholder="e.g. Proftpd 1.3.3"
        autocomplete="off"
        spellcheck="false"
      >
      <button id="search-btn">Search</button>
    </div>
  </div>
  <p>It is best to use specific versions. Search will only return 40 most recent results.<br>
      In broad searches, it is necessary to look through results to find applicable vulnerabilities.</p>
  <p id="status-msg"></p>
  <div id="results"></div>

  <script src="/scanner/assignment.js"></script>
</body>
</html>
